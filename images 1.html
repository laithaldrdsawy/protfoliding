<!DOCTYPE html>
<html lang="en">
<head>
    <title>Image Tags Example</title>
</head>

<body>

    <h1>HTML Image Tags</h1>

    <!-- picture -->
    <picture>

        <source 
            media="(min-width: 800px)"
            srcset="https://picsum.photos/600/300">

        <source 
            media="(min-width: 400px)"
            srcset="https://picsum.photos/400/200">

        <!-- img -->
        <img 
            src="https://picsum.photos/300/200"
            alt="Random Image"
            width="300"
            height="200"
            usemap="#imagemap">

    </picture>

    <br><br>

    <!-- map -->
    <map name="imagemap">

        <!-- area -->
        <area 
            shape="rect"
            coords="0,0,150,200"
            href="https://www.google.com"
            alt="Google"
            target="_blank">

        <area 
            shape="rect"
            coords="150,0,300,200"
            href="https://www.youtube.com"
            alt="YouTube"
            target="_blank">

    </map>

    <p>
        Click the left side of the image for Google,
        or the right side for YouTube.
    </p>

</body>
</html>





<!DOCTYPE html>
<html lang="en">
<head>
    <title>Image with Buttons</title>
    <style>
        .btn {
            display: inline-block;
            padding: 10px 20px;
            margin: 10px;
            background-color: #333;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
        .btn:hover {
            background-color: #555;
        }
    </style>
</head>
<body>

<h1>Image with Buttons</h1>

<img 
    src="https://picsum.photos/400/200"
    alt="Random Image"
    width="400"
    height="200">

<br><br>

<a href="https://www.google.com" target="_blank" class="btn">Google</a>
<a href="https://www.youtube.com" target="_blank" class="btn">YouTube</a>

</body>
</html>
