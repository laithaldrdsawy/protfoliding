<!DOCTYPE html>
<html lang="en">
<head>
    <title>Buttons with Links</title>

    <style>

        button {
            padding: 10px 20px;
            margin: 10px;
            border: none;
            cursor: pointer;
            color: white;
            font-size: 16px;
        }

        .google {
            background-color: #4285F4;
        }

        .youtube {
            background-color: #FF0000;
        }

        .facebook {
            background-color: #1877F2;
        }

        .github {
            background-color: #333;
        }

    </style>
</head>

<body>

<h1>Buttons Open Links</h1>

<button class="google" onclick="window.location.href='https://www.google.com'">
    Google
</button>

<button class="youtube" onclick="window.location.href='https://www.youtube.com'">
    YouTube
</button>

<button class="facebook" onclick="window.location.href='https://www.facebook.com'">
    Facebook
</button>

<button class="github" onclick="window.location.href='https://www.github.com'">
    GitHub
</button>

</body>
</html>




<!DOCTYPE html>
<html lang="en">
<head>
    <title>Buttons with Links - Alternative</title>
    <style>
        .btn {
            display: inline-block;
            padding: 12px 25px;
            margin: 10px;
            font-size: 16px;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            transition: 0.3s;
        }
        .btn:hover {
            opacity: 0.8;
        }
        .google { background-color: #4285F4; }
        .youtube { background-color: #FF0000; }
        .facebook { background-color: #1877F2; }
        .github { background-color: #333; }
    </style>
</head>
<body>

<h1>Styled Links as Buttons</h1>

<a href="https://www.google.com" class="btn google">Google</a>
<a href="https://www.youtube.com" class="btn youtube">YouTube</a>
<a href="https://www.facebook.com" class="btn facebook">Facebook</a>
<a href="https://www.github.com" class="btn github">GitHub</a>

</body>
</html>
