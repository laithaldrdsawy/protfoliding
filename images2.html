<!DOCTYPE html>
<html lang="en">
<head>
    <title>Gradient Background Example</title>
    <style>
        body {
            background: linear-gradient(to right, #00c6ff, #0072ff);
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: Arial;
        }
        h1 {
            color: white;
            font-size: 50px;
            margin-bottom: 20px;
        }
        p {
            color: #f2f2f2;
            font-size: 25px;
        }
    </style>
</head>
<body>

    <h1>Beautiful Gradient Background</h1>
    <p>This page uses a gradient background instead of an image.</p>

</body>
</html>






<!DOCTYPE html>
<html lang="en">
<head>

    <title>Background Image Example</title>

    <style>

        body{
            background-image: url('https://picsum.photos/1200/800');
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-size: cover;
        }

        h1{
            color: rgb(0, 0, 0);
            text-align: center;
            margin-top: 100px;
            font-size: 50px;
        }

        p{
            color: rgb(0, 0, 0);
            text-align: center;
            font-size: 25px;
        }

    </style>

</head>

<body>

    <h1>Beautiful Background</h1>

    <p>
        This page uses a full-screen background image.
    </p>

</body>
</html>
