<!DOCTYPE html>
<html lang="en">
<head>
    <title>Links Example</title>
</head>

<body>

    <h1>HTML Links</h1>

    <!-- _self -->
    <a href="https://www.google.com" target="_self">
        Open Google in same tab
    </a>

    <br><br>

    <!-- _blank -->
    <a href="https://www.youtube.com" target="_blank">
        Open YouTube in new tab
    </a>

    <br><br>

    <!-- _parent -->
    <a href="https://www.wikipedia.org" target="_parent">
        Open Wikipedia using _parent
    </a>

    <br><br>

    <!-- _top -->
    <a href="https://www.github.com" target="_top">
        Open GitHub using _top
    </a>

    <br><br>

    <!-- Image as a link -->
    <a href="https://www.instagram.com" target="_blank">
        <img src="https://cdn-icons-png.flaticon.com/512/174/174855.png"
             width="100"
             height="100"
             alt="Instagram">
    </a>

    <br><br>

    <!-- mailto -->
    <a href="mailto:test@gmail.com">
        Send Email
    </a>

</body>
</html>
