<!DOCTYPE html>
<html lang="en">
<head>
    <title>Links Example</title>
</head>

<body>

    <h1>HTML Links</h1>

    <!-- _self -->
    <a href="https://www.google.com" target="_self">
        Open Google in same tab
    </a>

    <br><br>

    <!-- _blank -->
    <a href="https://www.youtube.com" target="_blank">
        Open YouTube in new tab
    </a>

    <br><br>

    <!-- _parent -->
    <a href="https://www.wikipedia.org" target="_parent">
        Open Wikipedia using _parent
    </a>

    <br><br>

    <!-- _top -->
    <a href="https://www.github.com" target="_top">
        Open GitHub using _top
    </a>

    <br><br>

    <!-- Image as a link -->
    <a href="https://www.instagram.com" target="_blank">
        <img src="https://cdn-icons-png.flaticon.com/512/174/174855.png"
             width="100"
             height="100"
             alt="Instagram">
    </a>

    <br><br>

    <!-- mailto -->
    <a href="mailto:test@gmail.com">
        Send Email
    </a>

</body>
</html>






<!DOCTYPE html>
<html lang="en">
<head>
    <title>Links Menu Example</title>
    <style>
        ul {
            list-style-type: none;
            padding: 0;
            background-color: #333;
        }
        li {
            display: inline;
            margin: 0;
        }
        a {
            display: inline-block;
            padding: 10px 20px;
            color: white;
            text-decoration: none;
        }
        a:hover {
            background-color: #555;
        }
    </style>
</head>
<body>

<h1>HTML Links Menu</h1>

<ul>
    <li><a href="https://www.google.com" target="_self">Google</a></li>
    <li><a href="https://www.youtube.com" target="_blank">YouTube</a></li>
    <li><a href="https://www.wikipedia.org" target="_parent">Wikipedia</a></li>
    <li><a href="https://www.github.com" target="_top">GitHub</a></li>
    <li><a href="https://www.instagram.com" target="_blank">Instagram</a></li>
    <li><a href="mailto:test@gmail.com">Email</a></li>
</ul>

</body>
</html>
